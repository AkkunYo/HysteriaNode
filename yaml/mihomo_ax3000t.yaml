# 小米AX3000T优化配置 - 超精简版
# 硬件: MediaTek MT7981B (双核1.3GHz) + 256MB RAM
# 优化重点: 
#   - 仅保留6个常用国家（香港/台湾/日本/新加坡/韩国/美国）
#   - 测试间隔 7200秒
#   - 容差 150（减少频繁切换）
#   - DNS规则48小时更新
#   - 极致内存优化，避免死机重启


# YAML锚点定义

# ==================== 全局配置 ====================
mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
authentication: [""]
allow-lan: true
bind-address: '*'
mode: Rule
log-level: warning  # 优化: info→6降低复杂度

# 外部控制
external-controller: :9999
external-ui: ui
external-ui-url: "https://hk.gh-proxy.org/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"
secret: ""

# TUN模式 - 路由器推荐关闭
tun:
  enable: false

# 实验性功能
experimental:
  ignore-resolve-fail: true

# 性能优化
find-process-mode: "off"
routing-mark: 7894
unified-delay: true

# Hosts
use-system-hosts: true
hosts:
  'time.android.com': 203.107.6.88
  'time.facebook.com': 203.107.6.88
  'services.googleapis.cn': services.googleapis.com
  'localhost': 127.0.0.1

# ==================== DNS配置 ====================
dns:
  enable: true
  listen: :1053
  use-hosts: true
  ipv6: false

  # 默认DNS - 国内快速DNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 直连DNS - 用于中国域名
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 优化: fake-ip→redir-host 省内存30%+
  enhanced-mode: redir-host

  # fake-ip配置保留（备用）
  fake-ip-range: 28.0.0.0/8
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.direct'
    - 'time.*.com'
    - 'ntp.*.com'
    - '+.pool.ntp.org'
    - 'localhost.ptlogin2.qq.com'
    - 'music.163.com'
    - '*.music.163.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'Mijia Cloud'

  # DNS策略 - 分流解析
  nameserver-policy:
    'rule-set:cn,private': [223.5.5.5, 119.29.29.29]

  # 代理服务器DNS
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 国际域名DNS - 优化: 使用纯IP避免bootstrap问题
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 223.5.5.5

  # 尊重规则
  respect-rules: true

