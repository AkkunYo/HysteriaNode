# е°ҸзұіAX3000TдјҳеҢ–й…ҚзҪ® - и¶…зІҫз®ҖзүҲ
# зЎ¬д»¶: MediaTek MT7981B (еҸҢж ё1.3GHz) + 256MB RAM
# дјҳеҢ–йҮҚзӮ№: 
#   - д»…дҝқз•ҷ6дёӘеёёз”ЁеӣҪе®¶пјҲйҰҷжёҜ/еҸ°ж№ҫ/ж—Ҙжң¬/ж–°еҠ еқЎ/йҹ©еӣҪ/зҫҺеӣҪпјү
#   - жөӢиҜ•й—ҙйҡ” 7200з§’
#   - е®№е·® 150пјҲеҮҸе°‘йў‘з№ҒеҲҮжҚўпјү
#   - DNSи§„еҲҷ48е°Ҹж—¶жӣҙж–°
#   - жһҒиҮҙеҶ…еӯҳдјҳеҢ–пјҢйҒҝе…Қжӯ»жңәйҮҚеҗҜ


# YAMLй”ҡзӮ№е®ҡд№ү

# ==================== е…ЁеұҖй…ҚзҪ® ====================
mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
authentication: [""]
allow-lan: true
bind-address: '*'
mode: Rule
log-level: warning  # дјҳеҢ–: infoвҶ’6йҷҚдҪҺеӨҚжқӮеәҰ

# еӨ–йғЁжҺ§еҲ¶
external-controller: :9999
external-ui: ui
external-ui-url: "https://hk.gh-proxy.org/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip"
secret: ""

# TUNжЁЎејҸ - и·Ҝз”ұеҷЁжҺЁиҚҗе…ій—ӯ
tun:
  enable: false

# е®һйӘҢжҖ§еҠҹиғҪ
experimental:
  ignore-resolve-fail: true

# жҖ§иғҪдјҳеҢ–
find-process-mode: "off"
routing-mark: 7894
unified-delay: true

# Hosts
use-system-hosts: true
hosts:
  'time.android.com': 203.107.6.88
  'time.facebook.com': 203.107.6.88
  'services.googleapis.cn': services.googleapis.com
  'localhost': 127.0.0.1

# ==================== DNSй…ҚзҪ® ====================
dns:
  enable: true
  listen: :1053
  use-hosts: true
  ipv6: false

  # й»ҳи®ӨDNS - еӣҪеҶ…еҝ«йҖҹDNS
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # зӣҙиҝһDNS - з”ЁдәҺдёӯеӣҪеҹҹеҗҚ
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # дјҳеҢ–: fake-ipвҶ’redir-host зңҒеҶ…еӯҳ30%+
  enhanced-mode: redir-host

  # fake-ipй…ҚзҪ®дҝқз•ҷпјҲеӨҮз”Ёпјү
  fake-ip-range: 28.0.0.0/8
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.direct'
    - 'time.*.com'
    - 'ntp.*.com'
    - '+.pool.ntp.org'
    - 'localhost.ptlogin2.qq.com'
    - 'music.163.com'
    - '*.music.163.com'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'Mijia Cloud'

  # DNSзӯ–з•Ҙ - еҲҶжөҒи§Јжһҗ
  nameserver-policy:
    'rule-set:cn,private': [223.5.5.5, 119.29.29.29]

  # д»ЈзҗҶжңҚеҠЎеҷЁDNS
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # еӣҪйҷ…еҹҹеҗҚDNS - дјҳеҢ–: дҪҝз”ЁзәҜIPйҒҝе…Қbootstrapй—®йўҳ
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 223.5.5.5

  # е°ҠйҮҚи§„еҲҷ
  respect-rules: true

