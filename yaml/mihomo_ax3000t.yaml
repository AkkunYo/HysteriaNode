# ==================== 规则 ====================
rules:
  # 局域网直连
  - IP-CIDR,192.168.0.0/16,🎯 全球直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🎯 全球直连,no-resolve
  - IP-CIDR,127.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,169.254.0.0/16,🎯 全球直连,no-resolve
  - IP-CIDR,224.0.0.0/4,🎯 全球直连,no-resolve
  - IP-CIDR,240.0.0.0/4,🎯 全球直连,no-resolve

  # 自定义直连
  - DOMAIN-SUFFIX,mob.com,🎯 全球直连
  - DOMAIN-SUFFIX,ghfast.top,🎯 全球直连
  - DOMAIN-SUFFIX,gh-proxy.org,🎯 全球直连
  - DOMAIN-SUFFIX,spaceship.com,🎯 全球直连
  - DOMAIN-SUFFIX,local,🎯 全球直连

  # 我的网站
  - DOMAIN-SUFFIX,hidns.vip,🌏 我的网站
  - DOMAIN-SUFFIX,openapi.cfd,🌏 我的网站
  - DOMAIN-SUFFIX,zkyml.com,🌏 我的网站
  - DOMAIN-SUFFIX,945395.xyz,🌏 我的网站

  # 核心规则集（12个平衡方案）
  - RULE-SET,ads,🛑 广告
  - RULE-SET,ai,🤖 AI
  - RULE-SET,youtube,📹 YouTube
  - RULE-SET,netflix,🎥 NETFLIX
  - RULE-SET,telegramip,📲 Telegram,no-resolve
  - RULE-SET,apple-cn,🍎 Apple
  - RULE-SET,microsoft-cn,🪟 Microsoft
  - RULE-SET,games-cn,🎮 游戏
  - RULE-SET,media,🚀 节点选择
  - RULE-SET,proxy,🚀 节点选择
  - RULE-SET,cn,🀄️ 国内
  - RULE-SET,cnip,🀄️ 国内,no-resolve

  # 兜底
  - MATCH,🐟 漏网之鱼

