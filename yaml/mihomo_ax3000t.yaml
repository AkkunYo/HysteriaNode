    interval: 172800
    behavior: domain
    proxy: DIRECT
    url: "https://testingcf.jsdelivr.net/gh/DustinWin/ruleset_geodata@mihomo-ruleset/ads.mrs"

  # AI平台
  ai:
    type: http
    format: mrs
    interval: 172800
    behavior: domain
    proxy: DIRECT
