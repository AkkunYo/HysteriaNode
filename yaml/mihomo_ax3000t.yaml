      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🟢 直连

  # 自动选择 - 优化: 间隔1800→3600
  - name: ♻️ 自动选择
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    exclude-filter: "(?i)(剩余|重置|到期|防失联|官网|导航|客服|http|www|直连)"
    max-failed-times: 3

  # 负载均衡-散列
  - name: ☢ 负载均衡-散列
    type: load-balance
    strategy: consistent-hashing
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "^((?!(直连)).)*$"

  # 负载均衡-轮询
