proxy-groups:
  # 主选择组
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
