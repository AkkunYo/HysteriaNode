proxy-groups:
  # 主选择组
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🟢 直连

  # 自动选择 - 优化: 间隔1800→3600
  - name: ♻️ 自动选择
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    exclude-filter: "(?i)(剩余|重置|到期|防失联|官网|导航|客服|http|www|直连)"
    max-failed-times: 3

  # 负载均衡-散列
  - name: ☢ 负载均衡-散列
    type: load-balance
    strategy: consistent-hashing
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "^((?!(直连)).)*$"

  # 负载均衡-轮询
  - name: ☢ 负载均衡-轮询
    type: load-balance
    strategy: round-robin
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "^((?!(直连)).)*$"

  # 全部节点
  - name: 🌐 全部节点
    type: select
    include-all: true

  # ========== 应用分流 ==========

  # 我的网站
  - name: 🌏 我的网站
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点

  # AI平台
  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🟢 直连

  # YouTube
  - name: 📹 YouTube
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
