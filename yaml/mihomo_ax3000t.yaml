      - 🚀 节点选择
      - 🇭🇰 香港节点

  # 游戏
  - name: 🎮 游戏
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡

  # BT下载
  - name: 🧲 BT下载
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 网络测速
  - name: 📈 测速
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 全球直连
  - name: 🎯 全球直连
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 国内流量
  - name: 🀄️ 国内
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 广告拦截
  - name: 🛑 广告
    type: select
    proxies:
      - REJECT
      - 🟢 直连

  # 漏网之鱼
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🟢 直连

  # ========== 地区节点 ==========

  # 香港节点 - 优化: 间隔300→3600
  - name: 🇭🇰 香港节点
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(港|HK|Hong Kong|HongKong|hongkong)"

  # 台湾节点
  - name: 🇨🇳 台湾节点
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(台|TW|Taiwan|新北|彰化)"

  # 日本节点
  - name: 🇯🇵 日本节点
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(日|JP|Japan|东京|大阪)"

  # 新加坡
  - name: 🇸🇬 新加坡
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(新加坡|坡|狮城|SG|Singapore)"

  # 韩国
  - name: 🇰🇷 韩国
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(KR|Korea|首尔|韩|韓)"

  # 美国节点
  - name: 🇺🇲 美国节点
    type: url-test
    interval: 7200
    tolerance: 150
    lazy: true
    include-all: true
    filter: "(?i)(美|\\bUS\\b|United States|洛杉矶|西雅图|America)"

  # 英国节点 - 手动选择（节省内存）
  - name: 🇬🇧 英国节点
    type: select
    include-all: true
    filter: "(?i)(英国|\\bGB\\b|\\bUK\\b|Great Britain|United Kingdom|London|伦敦)"

  # 德国节点
  - name: 🇩🇪 德国节点
    type: select
    include-all: true
    filter: "(?i)(德国|\\bDE\\b|Germany|Frankfurt|Berlin|Munich|法兰克福|柏林|慕尼黑)"

  # 西班牙节点
  - name: 🇪🇸 西班牙节点
    type: select
    include-all: true
    filter: "(?i)(西班牙|\\bES\\b|Spain|Espana|Madrid|巴塞罗那)"

  # 巴西节点
  - name: 🇧🇷 巴西节点
    type: select
    include-all: true
    filter: "(?i)(巴西|\\bBR\\b|Brazil|Sao Paulo|圣保罗)"

  # 印度节点
  - name: 🇮🇳 印度节点
    type: select
    include-all: true
    filter: "(?i)(印度|\\bIN\\b|India|Mumbai|孟买|班加罗尔)"

  # 土耳其节点
  - name: 🇹🇷 土耳其节点
    type: select
    include-all: true
    filter: "(?i)(土耳其|\\bTR\\b|Turkey|Istanbul|伊斯坦布尔)"

# ==================== 规则 ====================
rules:
  # 局域网直连
  - IP-CIDR,192.168.0.0/16,🎯 全球直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🎯 全球直连,no-resolve
  - IP-CIDR,127.0.0.0/8,🎯 全球直连,no-resolve
  - IP-CIDR,169.254.0.0/16,🎯 全球直连,no-resolve
  - IP-CIDR,224.0.0.0/4,🎯 全球直连,no-resolve
  - IP-CIDR,240.0.0.0/4,🎯 全球直连,no-resolve

  # 自定义直连
  - DOMAIN-SUFFIX,mob.com,🎯 全球直连
  - DOMAIN-SUFFIX,ghfast.top,🎯 全球直连
  - DOMAIN-SUFFIX,gh-proxy.org,🎯 全球直连
  - DOMAIN-SUFFIX,spaceship.com,🎯 全球直连
  - DOMAIN-SUFFIX,local,🎯 全球直连

  # 我的网站
  - DOMAIN-SUFFIX,hidns.vip,🌏 我的网站
  - DOMAIN-SUFFIX,openapi.cfd,🌏 我的网站
  - DOMAIN-SUFFIX,zkyml.com,🌏 我的网站
  - DOMAIN-SUFFIX,945395.xyz,🌏 我的网站

  # 核心规则集（12个平衡方案）
  - RULE-SET,ads,🛑 广告
  - RULE-SET,ai,🤖 AI
  - RULE-SET,youtube,📹 YouTube
  - RULE-SET,netflix,🎥 NETFLIX
