proxy-groups:
  # 主选择组
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🇬🇧 英国节点
      - 🇩🇪 德国节点
      - 🇪🇸 西班牙节点
      - 🇧🇷 巴西节点
      - 🇮🇳 印度节点
      - 🇹🇷 土耳其节点
      - 🟢 直连

  # 自动选择 - 优化: 间隔1800→3600
  - name: ♻️ 自动选择
    type: url-test
    interval: 3600
    tolerance: 100
    lazy: true
    include-all: true
    exclude-filter: "(?i)(剩余|重置|到期|防失联|官网|导航|客服|http|www|直连)"

  # 负载均衡-散列
  - name: ☢ 负载均衡-散列
    type: load-balance
    strategy: consistent-hashing
    interval: 3600
    tolerance: 100
    lazy: true
    include-all: true
    filter: "^((?!(直连)).)*$"

  # 负载均衡-轮询
  - name: ☢ 负载均衡-轮询
