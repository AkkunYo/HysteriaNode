      - 🇧🇷 巴西节点
      - 🇮🇳 印度节点
      - 🇹🇷 土耳其节点

  # Steam
  - name: 🦾 Steam
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择
      - 🇭🇰 香港节点

  # 游戏
  - name: 🎮 游戏
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡

  # BT下载
  - name: 🧲 BT下载
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 网络测速
  - name: 📈 测速
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 全球直连
  - name: 🎯 全球直连
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 国内流量
  - name: 🀄️ 国内
    type: select
    proxies:
      - 🟢 直连
      - 🚀 节点选择

  # 广告拦截
  - name: 🛑 广告
    type: select
    proxies:
      - REJECT
      - 🟢 直连

  # 漏网之鱼
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - ☢ 负载均衡-散列
      - ☢ 负载均衡-轮询
      - 🌐 全部节点
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡
      - 🇰🇷 韩国
      - 🇺🇲 美国节点
      - 🇬🇧 英国节点
      - 🇩🇪 德国节点
      - 🇪🇸 西班牙节点
      - 🇧🇷 巴西节点
      - 🇮🇳 印度节点
      - 🇹🇷 土耳其节点
      - 🟢 直连

  # ========== 地区节点 ==========

  # 香港节点 - 优化: 间隔300→3600
  - name: 🇭🇰 香港节点
    type: url-test
    interval: 3600
    tolerance: 100
    lazy: true
    include-all: true
    filter: "(?i)(港|HK|Hong Kong|HongKong|hongkong)"

  # 台湾节点
  - name: 🇨🇳 台湾节点
