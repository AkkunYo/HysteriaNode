  # 自动选择 - 优化: 间隔1800→3600
  - name: ♻️ 自动选择
    type: url-test
    interval: 3600
    tolerance: 100
    lazy: true
    include-all: true
    exclude-filter: "(?i)(剩余|重置|到期|防失联|官网|导航|客服|http|www|直连)"

  # 负载均衡-散列
  - name: ☢ 负载均衡-散列
