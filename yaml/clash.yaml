# 策略组引用
pr: &pr {type: select, proxies: [🚀 节点选择, ♻️ 自动选择, ☢ 负载均衡-散列, ☢ 负载均衡-轮询, 🌐 全部节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🇸🇬 新加坡, 🇰🇷 韩国, 🇺🇲 美国节点, 🇩🇪 德国节点, 🇬🇧 英国节点, 🇪🇸 西班牙节点, 🇲🇽 墨西哥节点, 🇧🇷 巴西节点, 🇵🇭 菲律宾节点, 🇮🇳 印度节点, 🇹🇷 土耳其节点, 🧿 其它地区, 🟢 直连]}
best: &best {type: url-test, interval: 300, tolerance: 50, lazy: true, include-all: true}

# 全局配置
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false

external-ui: ui
external-ui-url: https://hk.gh-proxy.org/https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
external-controller: :9090
secret: clashclash

unified-delay: true
tcp-concurrent: true
enable-process: true

find-process-mode: strict
global-client-fingerprint: chrome

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 12
global-ua: "clash.meta"
geox-url:
  geoip: "https://hk.gh-proxy.org/https:/raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  geosite: "https://hk.gh-proxy.org/https:/raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  mmdb: "https://hk.gh-proxy.org/https:/raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/country.mmdb"
  asn: "https://hk.gh-proxy.org/https:/raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/GeoLite2-ASN.mmdb"

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"

# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 1500
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

hosts:
  xui.openapi.com: 192.168.1.2
  '*.94345.com': 192.168.1.2

# DNS模块
dns:
  enable: true
  use-hosts: true
  listen: 0.0.0.0:53
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15

  default-nameserver:
    - tls://223.5.5.5
    - tls://119.29.29.29

  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - '*.cloudflare.com'
    - '*.cloudflared.com'
    - '*.cloudflare-dns.com'
    - '*.cloudflare.net'
    - time.*.com
    - ntp.*.com
    - +.xiaomi.com
    - localhost.ptlogin2.qq.com
    - geosite:private
    - geosite:cn

  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

  proxy-server-nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    "geosite:cn,private,apple":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    "geosite:category-ads-all": rcode://success
    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"

